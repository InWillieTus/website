<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Dish — Dish Library</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<nav>
  <a class="nav-brand" href="/"><span>◆</span> Dish Library</a>
  <div class="nav-links">
    <a href="/">Menu</a>
    <a href="/add-dish.html">Add Dish</a>
  </div>
</nav>

<main class="page">
  <div class="page-header">
    <h1>Add a Dish</h1>
    <p>Fill in the details below — only name and category are required.</p>
  </div>

  <div class="form-card">
    <form id="dish-form" autocomplete="off">

      <div class="form-cols">
        <div class="form-row">
          <label for="name">Dish name *</label>
          <input type="text" id="name" name="name" placeholder="e.g. Pasta Carbonara" required maxlength="120">
        </div>
        <div class="form-row">
          <label for="category">Category *</label>
          <select id="category" name="category" required>
            <option value="" disabled selected>Choose…</option>
            <option>Starter</option>
            <option>Main</option>
            <option>Side</option>
            <option>Dessert</option>
            <option>Soup</option>
            <option>Salad</option>
            <option>Breakfast</option>
            <option>Snack</option>
            <option>Drink</option>
            <option>Other</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <label for="ingredients">Ingredients</label>
        <textarea id="ingredients" name="ingredients" placeholder="e.g. eggs, guanciale, pecorino, black pepper, pasta" rows="3"></textarea>
        <p class="form-hint">Separate with commas or write naturally — whatever works for you.</p>
      </div>

      <div class="form-row">
        <label for="description">Description</label>
        <textarea id="description" name="description" placeholder="A short note about the dish — origin, tips, variations…" rows="3"></textarea>
      </div>

      <div class="form-row" style="max-width:160px">
        <label for="prep_time">Prep time (minutes)</label>
        <input type="number" id="prep_time" name="prep_time" min="1" max="9999" placeholder="30">
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary" id="submit-btn">Save dish</button>
        <a href="/" class="btn btn-outline">Cancel</a>
        <span id="form-error" style="color:var(--terracotta);font-size:.85rem;margin-left:auto"></span>
      </div>

    </form>
  </div>
</main>

<script src="/static/js/utils.js"></script>
<script>
  const form = document.getElementById("dish-form");
  const submitBtn = document.getElementById("submit-btn");
  const formError = document.getElementById("form-error");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    formError.textContent = "";
    submitBtn.disabled = true;
    submitBtn.textContent = "Saving…";

    const data = {
      name:        form.name.value.trim(),
      category:    form.category.value,
      ingredients: form.ingredients.value.trim(),
      description: form.description.value.trim(),
      prep_time:   form.prep_time.value ? parseInt(form.prep_time.value) : null,
    };

    try {
      await apiFetch("/dishes", {
        method: "POST",
        body: JSON.stringify(data),
      });
      showToast("Dish saved! 🎉");
      setTimeout(() => window.location.href = "/", 800);
    } catch (err) {
      formError.textContent = err.message;
      submitBtn.disabled = false;
      submitBtn.textContent = "Save dish";
    }
  });
</script>
</body>
</html>
